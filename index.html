<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Сейф 713 — Магічні загадки Гоґвортсу</title>
    <meta name="description"
        content="Розв'яжіть магічні загадки про світ Гаррі Поттера, щоб відкрити таємничий Сейф 713. Інтерактивна гра для справжніх фанатів магії та пригод.">
    <meta name="keywords" content="Гаррі Поттер, Гоґвортс, Сейф 713, магія, загадки, квест, інтерактивна гра, квідич">
    <meta name="author" content="Пан Артем">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://milamiplay.github.io/">
    <meta property="og:title" content="Сейф 713 — Магічні загадки Гоґвортсу">
    <meta property="og:description"
        content="Відгадай загадки та відчини магічний сейф! Пригода у світі Гаррі Поттера чекає на тебе.">
    <meta property="og:image" content="https://milamiplay.github.io/og-preview.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://milamiplay.github.io/">
    <meta property="twitter:title" content="Сейф 713 — Магічні загадки Гоґвортсу">
    <meta property="twitter:description"
        content="Відгадай загадки та відчини магічний сейф! Пригода у світі Гаррі Поттера чекає на тебе.">
    <meta property="twitter:image" content="https://milamiplay.github.io/og-preview.png">

    <link rel="icon" type="image/png" href="https://milamiplay.github.io/og-preview.png">
    <link rel="apple-touch-icon" href="https://milamiplay.github.io/og-preview.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "Сейф 713",
      "genre": ["Puzzle", "Quest"],
      "description": "Інтерактивний магічний квест за мотивами світу Гаррі Поттера.",
      "author": {
        "@type": "Person",
        "name": "Пан Артем"
      },
      "url": "https://milamiplay.github.io/"
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --safe-border: clamp(12px, 2vw, 20px);
            --scroll-pad: clamp(20px, 4vw, 50px);
            --gap: clamp(18px, 4vw, 50px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at center, #2a2d34 0%, #0d0f12 100%);
            min-height: 100svh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Crimson Text', serif;
            color: #fff;
            overflow-x: hidden;
            overflow-y: auto;
            touch-action: pan-x pan-y;
            padding: 18px;
        }

        button {
            font: inherit;
        }

        button:focus-visible {
            outline: 3px solid rgba(255, 215, 0, 0.8);
            outline-offset: 2px;
        }

        #container {
            display: flex;
            width: min(1200px, 100%);
            min-height: min(880px, calc(100svh - 36px));
            gap: var(--gap);
            align-items: stretch;
            justify-content: space-between;
        }

        /* --- Сувій з питаннями --- */
        #scroll {
            flex: 1;
            background-color: #eaddc5;
            background-image:
                linear-gradient(rgba(139, 69, 19, 0.05) 2px, transparent 2px),
                radial-gradient(circle at 10% 20%, rgba(139, 69, 19, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 69, 19, 0.15) 0%, transparent 40%);
            color: #3e2723;
            padding: var(--scroll-pad);
            min-height: 100%;
            border-radius: 5px 25px 5px 25px;
            box-shadow:
                10px 10px 30px rgba(0, 0, 0, 0.7),
                inset 0 0 40px rgba(139, 69, 19, 0.4),
                inset -5px -5px 15px rgba(139, 69, 19, 0.6);
            position: relative;
            transform: rotate(-1deg);
            overflow: hidden;
        }

        #questions-container {
            height: 100%;
            overflow-y: auto;
            padding-right: 10px;
            transform-origin: top left;
        }

        #questions-container::-webkit-scrollbar {
            width: 8px;
        }

        #questions-container::-webkit-scrollbar-track {
            background: rgba(139, 69, 19, 0.1);
            border-radius: 4px;
        }

        #questions-container::-webkit-scrollbar-thumb {
            background: #8b4513;
            border-radius: 4px;
        }

        @keyframes tearOff {
            0% {
                transform: translateY(0) rotate(0);
                opacity: 1;
            }

            100% {
                transform: translateY(150px) rotate(-10deg);
                opacity: 0;
            }
        }

        @keyframes dropIn {
            0% {
                transform: translateY(-30px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .tearing {
            animation: tearOff 0.6s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dropping {
            animation: dropIn 0.6s forwards ease-out;
        }

        #scroll::before,
        #scroll::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 15px;
            background: linear-gradient(to bottom, #5d4037, #3e2723);
            border-radius: 10px;
            z-index: 10;
        }

        #scroll::before {
            top: -5px;
        }

        #scroll::after {
            bottom: -5px;
        }

        #scroll h2 {
            font-family: 'Cinzel Decorative', serif;
            text-align: center;
            margin-bottom: 20px;
            font-size: clamp(24px, 2.4vw, 32px);
            border-bottom: 2px solid #8d6e63;
            padding-bottom: 10px;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        #scroll ol {
            padding-left: 20px;
            font-size: clamp(16px, 1.8vw, 20px);
            line-height: 1.5;
            font-weight: bold;
        }

        #scroll li {
            margin-bottom: 15px;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
        }

        /* --- Сейф --- */
        #safe-wrapper {
            flex: 1.2;
            min-height: 100%;
            position: relative;
            perspective: 1500px;
            background: linear-gradient(135deg, #33363b, #15171a);
            border: var(--safe-border) solid #1a1c20;
            border-radius: 10px;
            box-shadow: 20px 20px 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 0, 0, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #safe-wrapper::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 10px 10px, #555 3px, #111 4px, transparent 5px),
                radial-gradient(circle at calc(100% - 10px) 10px, #555 3px, #111 4px, transparent 5px),
                radial-gradient(circle at 10px calc(100% - 10px), #555 3px, #111 4px, transparent 5px),
                radial-gradient(circle at calc(100% - 10px) calc(100% - 10px), #555 3px, #111 4px, transparent 5px);
            z-index: 5;
        }

        /* Інтер'єр */
        #interior {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0d0d0d;
            border-top: clamp(26px, 5vw, 50px) solid #030303;
            border-bottom: clamp(26px, 5vw, 50px) solid #1a1a1a;
            border-left: clamp(26px, 5vw, 50px) solid #080808;
            border-right: clamp(26px, 5vw, 50px) solid #080808;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 1);
            display: block;
            z-index: 1;
        }

        .stone-container {
            position: absolute;
            bottom: clamp(22px, 6vw, 50px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .stone-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(110px, 22vw, 160px);
            height: clamp(110px, 22vw, 160px);
            background: radial-gradient(circle, rgba(255, 20, 20, 0.5) 0%, transparent 60%);
            animation: pulseGlow 2s infinite alternate;
            z-index: 1;
            pointer-events: none;
        }

        .stone {
            width: clamp(62px, 10vw, 90px);
            height: clamp(78px, 13vw, 110px);
            background: linear-gradient(135deg, #ff1a1a 0%, #b30000 40%, #660000 100%);
            clip-path: polygon(45% 5%, 65% 0%, 90% 20%, 100% 45%, 85% 85%, 55% 100%, 20% 90%, 0% 60%, 10% 25%);
            box-shadow: inset -10px -10px 20px rgba(0, 0, 0, 0.9), inset 10px 10px 25px rgba(255, 150, 150, 0.9), 0 0 20px rgba(255, 0, 0, 0.5);
            position: relative;
            z-index: 3;
        }

        .stone::before {
            content: '';
            position: absolute;
            top: 5%;
            left: 10%;
            right: 15%;
            bottom: 10%;
            background: linear-gradient(70deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0) 40%);
            clip-path: polygon(50% 0%, 100% 30%, 80% 100%, 20% 100%, 0% 30%);
        }

        .stone::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(105deg, rgba(255, 255, 255, 0.9) 0%, transparent 30%);
            clip-path: polygon(20% 20%, 80% 10%, 90% 80%, 10% 90%);
        }

        .stone-shadow {
            width: clamp(56px, 9vw, 70px);
            height: 12px;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            margin-top: -5px;
            z-index: 2;
        }

        @keyframes pulseGlow {
            from {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }

            to {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }

        .next-btn {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            background: linear-gradient(to bottom, #d4af37, #997a00);
            border: 2px solid #ffd700;
            color: #111;
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(15px, 1.5vw, 18px);
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            transition: opacity 0.5s ease, transform 0.3s, box-shadow 0.3s;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            white-space: nowrap;
        }

        .next-btn.show {
            opacity: 1;
            pointer-events: all;
        }

        .next-btn:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 1);
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* Дверцята — взято за основу зі старого робочого прикладу */
        #door {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #4f565e 0%, #2c3035 40%, #1d2024 100%);
            border: 15px solid;
            border-color: #7a848f #1a1c20 #1a1c20 #7a848f;
            transform-origin: left center;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: clamp(24px, 4vw, 40px);
            transform-style: preserve-3d;
            backface-visibility: hidden;
            will-change: transform;
        }

        #door.open {
            transform: rotateY(-105deg);
        }

        #door.error {
            animation: shake 0.4s ease-in-out;
        }

        #door.error::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 0, 0, 0.2);
            pointer-events: none;
            z-index: 20;
        }

        .error-text {
            position: absolute;
            top: clamp(82px, 14vw, 120px);
            color: #ff3333;
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(36px, 8vw, 55px);
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 30;
            letter-spacing: 5px;
        }

        #door.error .error-text {
            opacity: 1;
            animation: blink 0.2s infinite alternate;
        }

        @keyframes blink {
            from {
                opacity: 1;
                text-shadow: 0 0 10px #ff0000;
            }

            to {
                opacity: 0.5;
                text-shadow: 0 0 30px #ff0000, 0 0 40px darkred;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-15px);
            }

            40% {
                transform: translateX(15px);
            }

            60% {
                transform: translateX(-10px);
            }

            80% {
                transform: translateX(10px);
            }
        }

        .vault-number {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(48px, 8vw, 70px);
            font-weight: bold;
            color: #222;
            text-shadow: -1px -1px 1px rgba(255, 255, 255, 0.2), 2px 2px 3px rgba(0, 0, 0, 0.8);
            margin-bottom: clamp(26px, 6vw, 50px);
            letter-spacing: 5px;
            background: linear-gradient(to bottom, #b39700, #ffeb85, #8a7300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            line-height: 1;
        }

        .lock-container {
            background: linear-gradient(to bottom, #111, #222);
            padding: clamp(12px, 2vw, 20px);
            border-radius: 10px;
            border: 4px solid #444;
            border-top-color: #222;
            border-left-color: #222;
            box-shadow: inset 0 0 15px #000, 0 10px 20px rgba(0, 0, 0, 0.8);
            display: flex;
            gap: clamp(8px, 1.4vw, 15px);
            margin-bottom: clamp(26px, 6vw, 50px);
        }

        .digit-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .digit-btn {
            background: linear-gradient(to bottom, #555, #333);
            border: 1px solid #111;
            color: #aaa;
            width: clamp(34px, 5vw, 40px);
            height: clamp(24px, 3.6vw, 25px);
            cursor: pointer;
            font-size: clamp(13px, 1.5vw, 14px);
            border-radius: 3px;
            box-shadow: inset 1px 1px 2px rgba(255, 255, 255, 0.2), 1px 1px 3px #000;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .digit-btn:active {
            background: #222;
            box-shadow: inset 2px 2px 5px #000;
        }

        .digit-display {
            width: clamp(40px, 6vw, 50px);
            height: clamp(54px, 9vw, 70px);
            background: #0a0a0a;
            border: 2px solid #000;
            box-shadow: inset 0 5px 10px #000, 0 2px 0 rgba(255, 255, 255, 0.1);
            color: #e0d0b0;
            font-family: 'Cinzel Decorative', monospace;
            font-size: clamp(28px, 5vw, 40px);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px 0;
            text-shadow: 0 0 5px rgba(224, 208, 176, 0.5);
        }

        .handle-wrapper {
            position: relative;
            width: clamp(96px, 18vw, 140px);
            height: clamp(96px, 18vw, 140px);
            border-radius: 50%;
            background: linear-gradient(135deg, #1d2024, #33363b);
            box-shadow: inset 5px 5px 10px rgba(0, 0, 0, 0.8), inset -2px -2px 5px rgba(255, 255, 255, 0.1), 0 10px 20px rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .handle {
            width: clamp(68px, 13vw, 100px);
            height: clamp(68px, 13vw, 100px);
            border-radius: 50%;
            background: conic-gradient(from 0deg, #555, #999, #444, #777, #333, #888, #555);
            border: 5px solid #222;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.9);
            cursor: pointer;
            position: relative;
            transition: transform 0.5s;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .handle::before,
        .handle::after {
            content: '';
            position: absolute;
            background: linear-gradient(to bottom, #888, #444);
            border: 2px solid #222;
            box-shadow: 0 2px 5px #000;
        }

        .handle::before {
            top: clamp(-15px, -2vw, -20px);
            bottom: clamp(-15px, -2vw, -20px);
            left: 40%;
            right: 40%;
        }

        .handle::after {
            left: clamp(-15px, -2vw, -20px);
            right: clamp(-15px, -2vw, -20px);
            top: 40%;
            bottom: 40%;
        }

        .handle-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: clamp(20px, 4vw, 30px);
            height: clamp(20px, 4vw, 30px);
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, #222, #000);
            border-radius: 50%;
            z-index: 2;
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.2);
        }

        .handle:hover {
            filter: brightness(1.2);
        }

        #door.success .handle {
            transform: rotate(90deg);
        }

        @media (max-width: 900px) {
            body {
                align-items: flex-start;
            }

            #container {
                flex-direction: column;
                min-height: auto;
                padding: 6px 0;
            }

            #scroll,
            #safe-wrapper {
                width: 100%;
                min-height: 500px;
            }

            #scroll {
                transform: none;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            #container {
                gap: 16px;
            }

            #scroll {
                padding: 20px;
                min-height: auto;
            }

            #questions-container {
                max-height: none;
            }

            #scroll h2 {
                font-size: 22px;
                margin-bottom: 15px;
            }

            #scroll ol {
                font-size: 14px;
                margin-bottom: 0;
                line-height: 1.4;
            }

            #scroll li {
                margin-bottom: 10px;
            }

            #safe-wrapper {
                min-height: 420px;
            }

            .lock-container {
                width: min(100%, 290px);
                justify-content: center;
            }

            .next-btn {
                padding: 12px 20px;
                max-width: calc(100% - 24px);
                white-space: normal;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div id="container">
        <div id="scroll">
            <div id="questions-container">
                <h2>Загадки Сховища</h2>
                <ol id="questions-list"></ol>
            </div>
        </div>

        <div id="safe-wrapper">
            <div id="interior">
                <div class="stone-container">
                    <div class="stone-glow"></div>
                    <div class="stone"></div>
                    <div class="stone-shadow"></div>
                </div>
                <button class="next-btn" id="play-again-btn" type="button">Зіграти ще раз</button>
            </div>

            <div id="door">
                <div class="vault-number">713</div>
                <div class="error-text" aria-hidden="true">ERROR</div>

                <div class="lock-container">
                    <div class="digit-group">
                        <button class="digit-btn" type="button" data-index="0" data-delta="1"
                            aria-label="Збільшити першу цифру">▲</button>
                        <div class="digit-display" id="digit-0">0</div>
                        <button class="digit-btn" type="button" data-index="0" data-delta="-1"
                            aria-label="Зменшити першу цифру">▼</button>
                    </div>
                    <div class="digit-group">
                        <button class="digit-btn" type="button" data-index="1" data-delta="1"
                            aria-label="Збільшити другу цифру">▲</button>
                        <div class="digit-display" id="digit-1">0</div>
                        <button class="digit-btn" type="button" data-index="1" data-delta="-1"
                            aria-label="Зменшити другу цифру">▼</button>
                    </div>
                    <div class="digit-group">
                        <button class="digit-btn" type="button" data-index="2" data-delta="1"
                            aria-label="Збільшити третю цифру">▲</button>
                        <div class="digit-display" id="digit-2">0</div>
                        <button class="digit-btn" type="button" data-index="2" data-delta="-1"
                            aria-label="Зменшити третю цифру">▼</button>
                    </div>
                    <div class="digit-group">
                        <button class="digit-btn" type="button" data-index="3" data-delta="1"
                            aria-label="Збільшити четверту цифру">▲</button>
                        <div class="digit-display" id="digit-3">0</div>
                        <button class="digit-btn" type="button" data-index="3" data-delta="-1"
                            aria-label="Зменшити четверту цифру">▼</button>
                    </div>
                </div>

                <div class="handle-wrapper">
                    <button class="handle" id="handle-btn" type="button" aria-label="Спробувати відкрити сейф">
                        <div class="handle-center"></div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const questionBank = [
            { q: "Скільки голів у собаки-охоронця Пушка?", a: 3 },
            { q: "Номер платформи (ціла частина), з якої рушає Гоґвортс-Експрес?", a: 9 },
            { q: "Скільки гуртожитків у школі Гоґвортс?", a: 4 },
            { q: "Скільки братів у Рона Візлі (без урахування його самого)?", a: 5 },

            { q: "Скільки разів Дамблдор переміг Ґріндельвальда?", a: 1 },
            { q: "Скільки драконів брало участь у першому завданні Тричаклунського турніру?", a: 4 },
            { q: "Скільки чемпіонів брало участь у Тричаклунському турнірі?", a: 4 }
        ];

        const questionsList = document.getElementById('questions-list');
        const playAgainBtn = document.getElementById('play-again-btn');
        const door = document.getElementById('door');
        const qContainer = document.getElementById('questions-container');
        const handleBtn = document.getElementById('handle-btn');
        const digitButtons = Array.from(document.querySelectorAll('.digit-btn'));
        const digitDisplays = Array.from({ length: 4 }, (_, i) => document.getElementById(`digit-${i}`));

        let unusedQuestions = [];
        let CORRECT_CODE = [0, 0, 0, 0];
        let currentCode = [0, 0, 0, 0];
        let isLocked = true;
        let errorTimeout = null;
        let openTimeout = null;
        let showButtonTimeout = null;
        let resetTimeout = null;

        function shuffleArray(array) {
            const copy = [...array];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function renderDigits() {
            digitDisplays.forEach((display, index) => {
                display.textContent = currentCode[index];
            });
        }

        function initSafe() {
            if (unusedQuestions.length < 4) {
                unusedQuestions = shuffleArray(questionBank);
            }

            const selected = unusedQuestions.splice(0, 4);
            questionsList.innerHTML = '';

            selected.forEach((item, index) => {
                const li = document.createElement('li');
                li.textContent = item.q;
                questionsList.appendChild(li);
                CORRECT_CODE[index] = item.a;
            });

            currentCode = [0, 0, 0, 0];
            renderDigits();
        }

        function clearTimers() {
            clearTimeout(errorTimeout);
            clearTimeout(openTimeout);
            clearTimeout(showButtonTimeout);
            clearTimeout(resetTimeout);
        }

        function rollDigitsToZero() {
            currentCode = [0, 0, 0, 0];
            renderDigits();
        }

        function resetSafe() {
            clearTimers();
            playAgainBtn.classList.remove('show');
            door.classList.remove('open', 'error');
            rollDigitsToZero();

            qContainer.classList.remove('dropping');
            qContainer.classList.add('tearing');

            resetTimeout = setTimeout(() => {
                door.classList.remove('success');
                initSafe();
                isLocked = true;
                qContainer.classList.remove('tearing');
                qContainer.classList.add('dropping');
            }, 1500);
        }

        function changeDigit(index, delta) {
            if (!isLocked) return;

            currentCode[index] += delta;

            if (currentCode[index] > 9) currentCode[index] = 0;
            if (currentCode[index] < 0) currentCode[index] = 9;

            digitDisplays[index].textContent = currentCode[index];
        }

        function attemptOpen() {
            if (!isLocked) return;

            const isCorrect = currentCode.every((val, index) => val === CORRECT_CODE[index]);

            if (isCorrect) {
                clearTimers();
                isLocked = false;
                door.classList.add('success');

                openTimeout = setTimeout(() => {
                    door.classList.add('open');

                    showButtonTimeout = setTimeout(() => {
                        playAgainBtn.classList.add('show');
                    }, 3000);
                }, 500);
            } else {
                door.classList.remove('error');
                void door.offsetWidth;
                door.classList.add('error');

                clearTimeout(errorTimeout);
                errorTimeout = setTimeout(() => {
                    door.classList.remove('error');
                }, 3000);
            }
        }

        digitButtons.forEach((button) => {
            button.addEventListener('click', () => {
                changeDigit(Number(button.dataset.index), Number(button.dataset.delta));
            });
        });

        handleBtn.addEventListener('click', attemptOpen);
        playAgainBtn.addEventListener('click', resetSafe);

        document.addEventListener('dblclick', (event) => {
            event.preventDefault();
        }, { passive: false });

        window.addEventListener('load', initSafe);
    </script>
